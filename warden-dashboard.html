<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warden Dashboard - Overview</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body, html {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('1000137540.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .overlay {
            min-height: 100vh;
            width: 100%;
            background-color: rgba(0, 20, 50, 0.45); 
            padding: 30px 20px;
        }

        /* Top Navbar Style */
        .navbar-custom {
            background: rgba(0, 28, 68, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        /* Top Counter Cards */
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            border: none;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Custom styling for management buttons */
        .panel-btn {
            min-height: 120px;
            transition: all 0.3s ease;
            border-width: 2px;
        }

        .panel-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="container-fluid max-width-container">
            
            <!-- TOP NAVBAR -->
            <div class="navbar-custom d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center">
                    <i class="bi bi-shield-lock-fill text-info fs-3 me-2"></i>
                    <div>
                        <h5 class="mb-0 fw-bold text-uppercase">Warden Portal</h5>
                        <small class="text-info">GWP Bokaro Hostel</small>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <a href="warden-dashboard.html" class="btn btn-info btn-sm rounded-pill px-3 fw-bold text-white">Dashboard</a>
                    <a href="warden-requests.html" class="btn btn-outline-light btn-sm rounded-pill px-3">View Requests</a>
                    <a href="index.html" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</a>
                </div>
            </div>

            <!-- STATS COUNTER ROW -->
            <div class="row g-3 mb-4">
                <!-- Pending Leaves -->
                <div class="col-md-4">
                    <div class="card stat-card p-4 d-flex flex-row justify-content-between align-items-center">
                        <div>
                            <span class="text-muted small fw-bold text-uppercase">Pending Leaves</span>
                            <h2 class="fw-bold text-dark my-1">3 Requests</h2>
                            <span class="badge bg-warning text-dark rounded-pill px-2">Action Required</span>
                        </div>
                        <i class="bi bi-hourglass-split text-warning display-5"></i>
                    </div>
                </div>

                <!-- Students Out Today -->
                <div class="col-md-4">
                    <div class="card stat-card p-4 d-flex flex-row justify-content-between align-items-center">
                        <div>
                            <span class="text-muted small fw-bold text-uppercase">Students Out Today</span>
                            <h2 class="fw-bold text-dark my-1">12 Students</h2>
                            <span class="text-success small fw-semibold"><i class="bi bi-check-circle-fill"></i> Authorized</span>
                        </div>
                        <i class="bi bi-box-arrow-right text-success display-5"></i>
                    </div>
                </div>

                <!-- Total Rooms Occupied -->
                <div class="col-md-4">
                    <div class="card stat-card p-4 d-flex flex-row justify-content-between align-items-center">
                        <div>
                            <span class="text-muted small fw-bold text-uppercase">Total Rooms Occupied</span>
                            <h2 class="fw-bold text-dark my-1">85 / 100</h2>
                            <span class="text-muted small">Hostel Blocks A & B</span>
                        </div>
                        <i class="bi bi-house-door text-primary display-5"></i>
                    </div>
                </div>
            </div>

            <!-- QUICK MANAGEMENT PANEL (POST NOTICE & EMERGENCY REMOVED) -->
            <div class="card bg-white bg-opacity-90 border-0 rounded-4 shadow-sm p-4 mb-4">
                <div class="d-flex align-items-center mb-3">
                    <i class="bi bi-grid-fill text-primary fs-4 me-2"></i>
                    <h5 class="fw-bold text-dark mb-0">Quick Management Panel</h5>
                </div>
                
                <div class="row g-3">
                    <!-- 1. Leave Requests Box -->
                    <div class="col-md-6">
                        <a href="warden-requests.html" class="btn btn-outline-primary w-100 py-4 rounded-3 text-decoration-none d-flex flex-column align-items-center justify-content-center panel-btn">
                            <i class="bi bi-file-earmark-text display-5 mb-2"></i>
                            <span class="fw-bold fs-5">Leave Requests</span>
                        </a>
                    </div>

                    <!-- 2. Student Directory Box -->
                    <div class="col-md-6">
                        <a href="student-management.html" class="btn btn-outline-secondary w-100 py-4 rounded-3 text-decoration-none d-flex flex-column align-items-center justify-content-center panel-btn" style="color: #4b5563; border-color: #cbd5e1;">
                            <i class="bi bi-people display-5 mb-2"></i>
                            <span class="fw-bold fs-5">Student Directory</span>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
