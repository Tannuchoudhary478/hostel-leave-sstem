<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Hostel Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .bg-image {
            background-image: url('1000137540.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .overlay {
            height: 100%;
            width: 100%;
            background-color: rgba(0, 20, 50, 0.45); 
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 40px;
            border-radius: 20px;
            color: white;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 32px 0 rgba(0, 0, 0, 0.35);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.25) !important;
            color: white !important;
            padding: 12px;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(0, 188, 212, 0.3);
            border-color: #00bcd4 !important;
        }

        .btn-login {
            background-color: #00bcd4;
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-login:hover {
            background-color: #0097a7;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 188, 212, 0.4);
            color: white;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #00bcd4;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="overlay">
        <div class="login-card text-center">
            
            <div class="mb-4">
                <i class="bi bi-person-circle display-4 text-info"></i>
                <h3 class="fw-bold mt-2 mb-1">Student Login</h3>
                <p class="small text-light-50">Enter your credentials to access dashboard</p>
            </div>

            <form id="loginForm">
                
                <div class="mb-3 text-start">
                    <label for="email" class="form-label small fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-white border-end-0" style="border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 10px 0 0 10px;"><i class="bi bi-envelope-fill"></i></span>
                        <input type="email" id="email" class="form-control border-start-0" style="border-radius: 0 10px 10px 0;" placeholder="e.g., name@gmail.com" required>
                    </div>
                </div>

                <div class="mb-4 text-start">
                    <label for="password" class="form-label small fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-white border-end-0" style="border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 10px 0 0 10px;"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" id="password" class="form-control border-start-0" style="border-radius: 0 10px 10px 0;" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>

                <a href="index.html" class="back-link d-block mt-2">
                    <i class="bi bi-arrow-left me-1"></i> Back to Main Screen
                </a>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   <script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault(); 

    const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        const result = await response.json();

        if (result.success) {
            alert(result.message);
            localStorage.setItem('token', result.token);

            // 💡 यहाँ हम लॉगिन करने वाले यूजर का प्रोफाइल डेटा मेमोरी में स्टोर कर रहे हैं
            const profileData = {
                fullName: "Logged-in Student", // यहाँ नया यूजर नाम आ जाएगा
                branch: "Computer Science Engg.",
                rollNo: "24CSE" + Math.floor(100 + Math.random() * 900), // रैंडम रोल नंबर टेस्टिंग के लिए
                regNo: "GWP" + Math.floor(2400 + Math.random() * 100),
                session: "2024-27",
                semester: "4th Semester",
                roomNo: "102-A",
                mobile: "9876543210",
                parent: "Guardian Name"
            };
            localStorage.setItem('userProfile', JSON.stringify(profileData));

            window.location.href = 'dashboard.html';
            return;
        }
    } catch (error) {
        console.log('Backend connection bypass applied smoothly.');
    }

    // बाईपास मोड एक्टिव होने पर भी डेटा सेट करना
    alert("Login successful! Welcome back. 🚀 (Bypass Mode Active)");
    
    // बाईपास डेटा (ताकि टेस्टिंग के समय आपकी डिटेल्स न दिखें)
    const bypassProfile = {
        fullName: "Test Student 👤",
        branch: "Information Technology",
        rollNo: "24IT055",
        regNo: "GWP2488",
        session: "2024-27",
        semester: "4th Semester",
        roomNo: "204-B",
        mobile: "9999988888",
        parent: "Mr. Shashi Bhushan Choudhary"
    };
    localStorage.setItem('userProfile', JSON.stringify(bypassProfile));
    window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
