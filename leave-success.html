<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Hostel Escape</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* Project Uniform Background Template */
        .bg-image {
            background-image: url('1000137540.jpeg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Dark blue premium layout overlay */
        .overlay {
            min-height: 100vh;
            width: 100%;
            background-color: rgba(0, 20, 50, 0.45); 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glassmorphic Box Wrapper */
        .success-box {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 20px;
            padding: 45px 35px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Success Dynamic Icon Frame */
        .icon-circle {
            font-size: 55px;
            color: #198754;
            background: rgba(25, 135, 84, 0.1);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(25, 135, 84, 0.15);
        }

        .success-box h2 {
            font-size: 24px;
            font-weight: 700;
            color: #001432;
            margin-bottom: 12px;
        }

        .success-box p {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-back {
            background-color: #0d6efd;
            color: white;
            font-weight: 600;
            border-radius: 25px;
            padding: 10px 30px;
            transition: 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);
        }

        .btn-back:hover {
            background-color: #0b5ed7;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.3);
        }
    </style>
</head>
<body>

    <!-- Unified Background Image -->
    <div class="bg-image"></div>

    <!-- Screen Centered Overlay Wrapper -->
    <div class="overlay">
        <div class="success-box">
            
            <!-- Animated Green Check Icon -->
            <div class="icon-circle">
                <i class="bi bi-check-circle-fill"></i>
            </div>

            <h2>Leave Request Submitted!</h2>
            <p>Your digital leave application logs have been successfully dispatched. The assigned hostel warden has been notified for verification logs.</p>

            <!-- Back Link configured to target dashboard.html directly -->
            <div class="d-grid gap-2 col-9 mx-auto">
                <a href="dashboard.html" class="btn-back justify-content-center shadow-sm">
                    <i class="bi bi-arrow-left-circle-fill"></i> Back to Dashboard
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
